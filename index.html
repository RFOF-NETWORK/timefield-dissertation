<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Zeitfeld-Dissertation · Start</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b0d14;
      color: #e8e8e8;
      padding: 2rem;
    }
    a { color: #7fd0ff; }
    #fallback { display: none; }
  </style>

  <script>
    async function init() {
      // Dynamisch den Basis-Pfad bestimmen (funktioniert in jeder Umgebung)
      const path = window.location.pathname;
      const base = path.endsWith("index.html")
        ? path.replace(/index\.html$/, "")
        : (path.endsWith("/") ? path : path + "/");

      // Kandidat für die Web-Oberfläche
      const target = base + "site/index.html";

      try {
        // Prüfen, ob site/index.html existiert
        const res = await fetch(target, { method: "HEAD" });

        if (res.ok) {
          // Wenn vorhanden → sauber weiterleiten
          window.location.href = target;
          return;
        }
      } catch (err) {
        // Ignorieren, wir zeigen Fallback
      }

      // Wenn site/index.html nicht existiert → Fallback anzeigen
      document.getElementById("fallback").style.display = "block";
    }

    window.addEventListener("DOMContentLoaded", init);
  </script>
</head>

<body>
  <div id="fallback">
    <h1>Zeitfeld-Dissertation</h1>
    <p>Die Weboberfläche konnte nicht automatisch geladen werden.</p>
    <p><a href="site/index.html">Manuell öffnen</a></p>
  </div>
</body>
</html>
